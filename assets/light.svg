<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Glows -->
    <radialGradient id="glow-left" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0969DA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8250DF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0969DA" stroke-width="0.7" stroke-opacity="0.05"/>
    </pattern>

    <!-- Text Gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#24292F"/>
      <stop offset="50%" stop-color="#0969DA"/>
      <stop offset="100%" stop-color="#8250DF"/>
    </linearGradient>

    <!-- Python snake gradients -->
    <linearGradient id="python-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0969DA"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
    <linearGradient id="python-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8250DF"/>
      <stop offset="100%" stop-color="#0969DA"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Typing Clip Path -->
    <clipPath id="type-clip">
      <rect x="80" y="70" width="0" height="60">
        <animate attributeName="width" values="0; 260; 260; 0; 0" keyTimes="0; 0.4; 0.85; 0.95; 1" dur="8s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- Radial Glows -->
  <rect width="100%" height="100%" fill="url(#glow-left)"/>
  <rect width="100%" height="100%" fill="url(#glow-right)"/>

  <!-- Background Grid -->
  <rect width="100%" height="100%" fill="url(#grid)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Stars/Particles in Background -->
  <circle cx="300" cy="80" r="1.5" fill="#0969DA" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="550" cy="140" r="2" fill="#1A7F37" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="680" cy="290" r="1.5" fill="#8250DF" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="220" cy="270" r="2" fill="#0969DA" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.5s" repeatCount="indefinite" />
  </circle>

  <!-- Rotating Geometric Shapes -->
  <g transform="translate(1100, 340)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite"/>
      <polygon points="0,-15 11,-11 15,0 11,11 0,15 -11,11 -15,0 -11,-11" fill="none" stroke="#0969DA" stroke-width="1" stroke-dasharray="2 2" opacity="0.3" />
      <circle r="6" fill="none" stroke="#8250DF" stroke-width="1" opacity="0.5" />
    </g>
  </g>
  <g transform="translate(100, 80)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="30s" repeatCount="indefinite"/>
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="none" stroke="#8250DF" stroke-width="1" opacity="0.2" />
      <rect x="-8" y="-8" width="16" height="16" rx="2" fill="none" stroke="#1A7F37" stroke-width="1" opacity="0.2" transform="rotate(45)" />
    </g>
  </g>

  <!-- Neural Network / Git Branches Connections -->
  <g>
    <!-- Paths -->
    <path d="M 180 260 L 290 180" stroke="#0969DA" stroke-width="1.5" stroke-opacity="0.18" fill="none" />
    <path d="M 290 180 L 420 240" stroke="#8250DF" stroke-width="1.5" stroke-opacity="0.18" fill="none" />
    <path d="M 420 240 L 510 150" stroke="#0969DA" stroke-width="1.5" stroke-opacity="0.18" fill="none" />
    <path d="M 510 150 L 620 210" stroke="#1A7F37" stroke-width="1.5" stroke-opacity="0.18" fill="none" />
    <path d="M 290 180 Q 400 130 510 150" stroke="#8250DF" stroke-width="1.5" stroke-opacity="0.15" fill="none" />
    <path d="M 180 260 Q 300 290 420 240" stroke="#0969DA" stroke-width="1.5" stroke-opacity="0.15" fill="none" />

    <!-- Animated Data Packets -->
    <circle r="4" fill="#1A7F37" filter="url(#glow)">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 180 260 L 290 180" />
    </circle>
    <circle r="3" fill="#0969DA" filter="url(#glow)">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M 420 240 L 510 150" />
    </circle>
    <circle r="3.5" fill="#8250DF" filter="url(#glow)">
      <animateMotion dur="5s" repeatCount="indefinite" path="M 290 180 Q 400 130 510 150" />
    </circle>
    <circle r="3.5" fill="#1A7F37" filter="url(#glow)">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 180 260 Q 300 290 420 240" />
    </circle>

    <!-- Network Nodes -->
    <circle cx="180" cy="260" r="5" fill="#0969DA">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="290" cy="180" r="6" fill="#8250DF">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
      <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="420" cy="240" r="6" fill="#1A7F37">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="6;8;6" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="510" cy="150" r="5" fill="#0969DA">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="620" cy="210" r="5" fill="#8250DF">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Typography: Name and Subtitle -->
  <g>
    <!-- Title with Typing Effect -->
    <text x="80" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="800" fill="url(#title-grad)" clip-path="url(#type-clip)">
      Karan Garg
    </text>
    <!-- Blinking Cursor -->
    <rect x="80" y="82" width="3" height="42" fill="#0969DA" opacity="0.8">
      <animate attributeName="x" values="80; 330; 330; 80; 80" keyTimes="0; 0.4; 0.85; 0.95; 1" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- Subtitle with Fade-in and Slide-up -->
    <text x="80" y="165" fill="#57606A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" letter-spacing="0.5" font-weight="500" opacity="0">
      AI Engineer • Full Stack Developer • Machine Learning • Open Source
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.25; 0.35; 0.85; 0.95" dur="8s" repeatCount="indefinite" />
      <animate attributeName="y" values="175; 175; 165; 165; 175" keyTimes="0; 0.25; 0.35; 0.85; 0.95" dur="8s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- Floating Tech Stack Icons -->
  <!-- Python -->
  <g transform="translate(120, 310)">
    <animateTransform attributeName="transform" type="translate" values="120,310; 120,300; 120,310" dur="4s" repeatCount="indefinite" />
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C7.5 2 7 5.5 7 5.5V8.5H12V9.5H5.5C5.5 9.5 2 9 2 13.5C2 18 5 18 5 18H7.5V15.5C7.5 13 9.5 12 12 12H16.5C16.5 12 20 12.5 20 8C20 3.5 16.5 2 12 2Z" fill="url(#python-grad-1)"/>
      <path d="M12 22C16.5 22 17 18.5 17 18.5V15.5H12V14.5H18.5C18.5 14.5 22 15 22 10.5C22 6 19 6 19 6H16.5V8.5C16.5 11 14.5 12 12 12H7.5C7.5 12 4 11.5 4 16C4 20.5 7.5 22 12 22Z" fill="url(#python-grad-2)"/>
      <circle cx="9" cy="5" r="0.75" fill="#FFFFFF"/>
      <circle cx="15" cy="19" r="0.75" fill="#FFFFFF"/>
    </svg>
  </g>

  <!-- React -->
  <g transform="translate(440, 80)">
    <animateTransform attributeName="transform" type="translate" values="440,80; 440,72; 440,80" dur="4.5s" repeatCount="indefinite" />
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="2" fill="#0969DA"/>
      <g stroke="#0969DA" stroke-width="1.2" filter="url(#glow)">
        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(0, 12, 12)">
          <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="12s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(60, 12, 12)">
          <animateTransform attributeName="transform" type="rotate" from="60 12 12" to="420 12 12" dur="12s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(120, 12, 12)">
          <animateTransform attributeName="transform" type="rotate" from="120 12 12" to="480 12 12" dur="12s" repeatCount="indefinite"/>
        </ellipse>
      </g>
    </svg>
  </g>

  <!-- Node.js -->
  <g transform="translate(620, 90)">
    <animateTransform attributeName="transform" type="translate" values="620,90; 620,98; 620,90" dur="3.8s" repeatCount="indefinite" />
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A7F37" stroke-width="1.5" stroke-linejoin="round" filter="url(#glow)">
      <path d="M12 2L4 6.5v9L12 22l8-4.5v-9L12 2z" fill="#1A7F37" fill-opacity="0.1"/>
      <path d="M12 2L4 6.5v9L12 22" />
      <path d="M12 12L20 7.5" />
      <path d="M12 12v10" />
    </svg>
  </g>

  <!-- TensorFlow -->
  <g transform="translate(580, 300)">
    <animateTransform attributeName="transform" type="translate" values="580,300; 580,308; 580,300" dur="5s" repeatCount="indefinite" />
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8250DF" stroke-width="1.5">
      <path d="M12 2L4 6.5v11L12 22V11.5L20 7L12 2z" fill="#8250DF" fill-opacity="0.1" />
      <path d="M12 2L20 6.5L12 11L4 6.5L12 2z" fill="#8250DF" fill-opacity="0.2"/>
      <path d="M12 11.5L20 7v11l-8 4V11.5z" fill="#8250DF" fill-opacity="0.15"/>
    </svg>
  </g>

  <!-- MongoDB -->
  <g transform="translate(300, 320)">
    <animateTransform attributeName="transform" type="translate" values="300,320; 295,312; 300,320" dur="4.2s" repeatCount="indefinite" />
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A7F37" stroke-width="1.5" filter="url(#glow)">
      <path d="M12 2C12 2 7 7 7 13C7 17.5 10 20 12 22C14 20 17 17.5 17 13C17 7 12 2 12 2Z" fill="#1A7F37" fill-opacity="0.1"/>
      <path d="M12 2v20M9 13c1-2 2-3 3-4s2 2 3 4" />
    </svg>
  </g>

  <!-- Floating Code Snippets -->
  <g transform="translate(620, 170)">
    <animateTransform attributeName="transform" type="translate" values="620,170; 620,162; 620,170" dur="6s" repeatCount="indefinite" />
    <text font-family="Courier New, monospace" font-size="11" fill="#8250DF" opacity="0.7">import torch.nn as nn</text>
  </g>
  <g transform="translate(450, 330)">
    <animateTransform attributeName="transform" type="translate" values="450,330; 442,325; 450,330" dur="5.5s" repeatCount="indefinite" />
    <text font-family="Courier New, monospace" font-size="11" fill="#0969DA" opacity="0.7">model.fit(X, y)</text>
  </g>
  <g transform="translate(180, 50)">
    <animateTransform attributeName="transform" type="translate" values="180,50; 185,58; 180,50" dur="7s" repeatCount="indefinite" />
    <text font-family="Courier New, monospace" font-size="11" fill="#1A7F37" opacity="0.7">const api = Router()</text>
  </g>

  <!-- Glassmorphic Coding Terminal -->
  <g transform="translate(720, 60)">
    <!-- Main Terminal Frame -->
    <rect width="400" height="280" rx="12" fill="#F6F8FA" fill-opacity="0.85" stroke="#D0D7DE" stroke-width="1.5" />
    
    <!-- Header/Titlebar -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 388 0 A 12 12 0 0 1 400 12 L 400 35 L 0 35 Z" fill="#EAEEF2" fill-opacity="0.95" stroke="#D0D7DE" stroke-width="0" />
    
    <!-- Window Control Buttons -->
    <circle cx="20" cy="18" r="5" fill="#CF222E" />
    <circle cx="36" cy="18" r="5" fill="#D4A72C" />
    <circle cx="52" cy="18" r="5" fill="#1A7F37" />
    <text x="200" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#57606A" font-weight="500" text-anchor="middle">terminal — bash</text>

    <!-- Terminal Output Content (Staggered Animation) -->
    <!-- Line 1: Prompt & Command -->
    <text x="20" y="65" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="600" fill="#1A7F37">
      karan@ai-node:~$ <tspan fill="#24292F">npm run train-model</tspan>
    </text>

    <!-- Line 2: Info Initialization -->
    <text x="20" y="90" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#57606A" opacity="0">
      [INFO] Initializing TensorFlow backend...
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.12;0.15;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- Line 3: Epoch 1 -->
    <text x="20" y="115" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#0969DA" opacity="0">
      Epoch 1/100 - loss: 0.1245 - acc: 0.985
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.28;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- Line 4: Epoch 50 -->
    <text x="20" y="140" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#0969DA" opacity="0">
      Epoch 50/100 - loss: 0.0121 - acc: 0.999
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.38;0.41;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- Line 5: Success Output -->
    <text x="20" y="165" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#1A7F37" opacity="0">
      [SUCCESS] Model optimization complete.
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.52;0.55;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- Line 6: Next Command Line Prompt -->
    <text x="20" y="195" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#1A7F37" opacity="0">
      karan@ai-node:~$ <tspan fill="#24292F">node deploy.js</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.68;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- Line 7: Deployment Output -->
    <text x="20" y="220" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#57606A" opacity="0">
      [INFO] Deploying agent weights to edge...
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.78;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="20" y="245" font-family="Courier New, SFMono-Regular, Consolas, monospace" font-size="13" fill="#1A7F37" opacity="0">
      [SUCCESS] Edge node active. Live!
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.84;0.87;0.92;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- Blinking command cursor -->
    <rect x="252" y="183" width="7" height="13" fill="#24292F" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;1;0;1;0;0" keyTimes="0;0.65;0.68;0.72;0.76;0.8;0.84;0.88;1" dur="10s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
